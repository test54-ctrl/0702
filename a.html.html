<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 칭찬 꽃밭</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --bg-color: #f7f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #636e72;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* 입력 폼 스타일 */
        .form-section {
            flex: 1;
            min-width: 320px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2d3436;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e17055;
        }

        /* 꽃밭 스타일 */
        .garden-section {
            flex: 1.5;
            min-width: 450px;
            background: linear-gradient(to bottom, #e0f7fa 70%, #81c784 70%);
            border-radius: 15px;
            height: 500px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 4px solid #fff;
        }

        .garden-title {
            position: absolute;
            top: 15px;
            left: 20px;
            margin: 0;
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2e7d32;
        }

        /* 꽃 아이콘 스타일 */
        .flower {
            position: absolute;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            animation: grow 0.5s ease-out forwards;
            user-select: none;
        }

        .flower:hover {
            transform: scale(1.3) rotate(15deg);
            z-index: 10;
        }

        @keyframes grow {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* 툴팁 (칭찬 내용 말풍선) */
        .flower .tooltip {
            visibility: hidden;
            width: 220px;
            background-color: rgba(45, 52, 54, 0.95);
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 12px;
            position: absolute;
            z-index: 11;
            bottom: 125%;
            left: 50%;
            margin-left: -110px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85rem;
            line-height: 1.4;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .flower:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip b {
            color: #ffeaa7;
            display: inline-block;
            margin-bottom: 4px;
        }
        
        .tooltip .tag {
            background: #00cec9;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <h1>🌸 우리 반 칭찬 꽃밭 🌼</h1>
    <p class="subtitle">친구에게 예쁜 말 한마디로 꽃밭을 채워주세요!</p>

    <div class="container">
        <div class="form-section">
            <form id="praiseForm">
                <div class="form-group">
                    <label for="friendName">1. 칭찬할 친구 이름</label>
                    <input type="text" id="friendName" placeholder="예: 홍길동" required>
                </div>

                <div class="form-group">
                    <label for="praiseCategory">2. 칭찬 항목</label>
                    <select id="praiseCategory" required>
                        <option value="">-- 항목을 선택하세요 --</option>
                        <option value="친절/배려">🤝 친절과 배려</option>
                        <option value="성실/노력">📝 성실과 노력</option>
                        <option value="리더십/협동">⭐ 리더십과 협동</option>
                        <option value="유머/밝은 에너지">😊 유머와 밝은 에너지</option>
                        <option value="기타">✨ 기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="praiseReason">3. 칭찬하는 이유 (자세하게)</label>
                    <textarea id="praiseReason" placeholder="친구가 왜 고마웠는지, 어떤 점이 멋졌는지 자세히 적어주세요!" required></textarea>
                </div>

                <button type="submit">🌻 꽃 피우기</button>
            </form>
        </div>

        <div class="garden-section" id="garden">
            <div class="garden-title">🌱 피어난 꽃을 마우스로 가리켜보세요!</div>
        </div>
    </div>

    <script>
        const flowers = ['🌸', '🌼', '🌻', '🌹', '🌷', '🌺'];
        const form = document.getElementById('praiseForm');
        const garden = document.getElementById('garden');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // 새로고침 방지

            // 입력값 가져오기
            const name = document.getElementById('friendName').value;
            const category = document.getElementById('praiseCategory').value;
            const reason = document.getElementById('praiseReason').value;

            // 랜덤 꽃 선택
            const randomFlower = flowers[Math.floor(Math.random() * flowers.length)];

            // 꽃 요소 생성
            const flowerDiv = document.createElement('div');
            flowerDiv.className = 'flower';
            flowerDiv.innerText = randomFlower;

            // 꽃이 심어질 무작위 위치 계산 (초록색 잔디밭 영역 위주로)
            // 가로: 5% ~ 90%, 세로: 70% ~ 90% (잔디밭 구역)
            const randomX = Math.random() * 85 + 5; 
            const randomY = Math.random() * 20 + 70; 

            flowerDiv.style.left = `${randomX}%`;
            flowerDiv.style.top = `${randomY}%`;

            // 말풍선(칭찬 내용) 추가
            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            tooltip.innerHTML = `
                <b>To. ${name}</b> <span class="tag">${category}</span><br>
                <span style="color:#dfe6e9;">💌 내용:</span><br>
                ${reason.replace(/\n/g, '<br>')}
            `;
            
            flowerDiv.appendChild(tooltip);
            garden.appendChild(flowerDiv);

            // 입력창 초기화
            form.reset();
            alert(`${name} 친구에게 줄 꽃이 심어졌어요! 🎉`);
        });
    </script>
</body>
</html>
